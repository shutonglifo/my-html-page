<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>班级安全监督员 · 到位统计</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            margin: 0;
        }

        .card {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            padding: 16px 16px 20px;
            border: 1px solid #e9eef3;
        }

        /* 标题区紧凑 */
        .title-section {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .main-title h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
        }

        .add-class-btn {
            background: #e6edf5;
            color: #1e4460;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1.5px solid #b9cde0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s;
        }

        .add-class-btn:hover {
            background: #d9e4f0;
        }

        .sub-action {
            color: #64748b;
            font-size: 0.85rem;
            background: #f8fafc;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px dashed #b9c7da;
        }

        /* 网格 —— 更紧凑，一屏展示更多 */
        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
            gap: 6px;
            margin: 12px 0 18px;
        }

        .class-btn {
            background: #ffffff;
            border: 1.5px solid #dde3ea;
            border-radius: 12px;
            padding: 6px 2px;
            font-size: 0.9rem;
            font-weight: 550;
            color: #1e293b;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            transition: all 0.12s;
            user-select: none;
            font-feature-settings: "tnum";
            line-height: 1.2;
        }

        .class-btn:hover {
            background: #f5f9ff;
            border-color: #9bb7d4;
            transform: translateY(-1px);
        }

        .class-btn.selected {
            background: #d4edda;
            border-color: #2e7d5e;
            color: #0a3b2a;
            font-weight: 600;
            border-width: 2px;
        }

        .class-btn.selected::after {
            content: " ✓";
            font-weight: 700;
            font-size: 0.85rem;
            margin-left: 1px;
        }

        /* 工具栏紧凑 */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stats {
            background: #f1f6fc;
            padding: 6px 14px;
            border-radius: 30px;
            color: #1e4460;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #cfdfef;
        }

        .btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn:hover {
            background: #f1f5f9;
        }

        /* 结果区稍作内缩 */
        .result-area {
            background: #f8fafc;
            border-radius: 18px;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .sentence-box {
            flex: 1;
            font-size: 1.1rem;
            color: #0b1e2b;
            font-weight: 500;
            word-break: break-word;
            line-height: 1.4;
            min-width: 200px;
        }

        .sentence-label {
            color: #4b6589;
            font-size: 0.8rem;
            margin-right: 6px;
        }

        .copy-btn {
            background: white;
            border: 1.5px solid #1e4460;
            color: #1e4460;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #1e4460;
            color: white;
        }

        .toast-message {
            font-size: 0.8rem;
            color: #2e7d5e;
            background: #e0f2e5;
            padding: 4px 12px;
            border-radius: 30px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .toast-message.show {
            opacity: 1;
        }

        .footer-note {
            margin-top: 12px;
            color: #6b7b8f;
            font-size: 0.75rem;
            text-align: right;
            border-top: 1px dashed #d7e0e9;
            padding-top: 10px;
        }

        /* 模态框保持 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 16px;
        }

        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: white;
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
            padding: 22px 20px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-header h2 {
            font-size: 1.4rem;
        }

        .class-textarea {
            min-height: 200px;
            font-size: 1rem;
            padding: 12px;
        }

        @media (max-width: 550px) {
            .card { padding: 12px; }
            .main-title h1 { font-size: 1.3rem; }
            .class-grid { grid-template-columns: repeat(6, 1fr); gap: 5px; }
            .class-btn { padding: 5px 1px; font-size: 0.8rem; border-radius: 10px; }
            .result-area { padding: 12px; }
        }

        /* 适配超大屏/平板也紧凑 */
        @media (min-width: 700px) {
            .class-grid { grid-template-columns: repeat(10, 1fr); }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title-section">
        <div class="main-title">
            <h1>📋 班级安全监督员统计</h1>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button class="add-class-btn" id="openModalBtn">
                <span style="font-size:1.1rem;">➕</span> 添加班级
            </button>
            <div class="sub-action">⏱️ 课间统计</div>
        </div>
    </div>

    <!-- 班级网格容器 -->
    <div id="classGridContainer" class="class-grid"></div>

    <div class="toolbar">
        <div class="stats" id="statsDisplay">
            📌 已选 <span id="selectedCount">0</span> 个班级
        </div>
        <div class="action-buttons">
            <button class="btn" id="clearAllBtn">🧹 清空</button>
        </div>
    </div>

    <div class="result-area">
        <div class="sentence-box">
            <span class="sentence-label">📢</span>
            <span id="generatedSentence">暂无班级到位</span>
        </div>
        <div class="copy-section">
            <span id="copyToast" class="toast-message">✅ 已复制</span>
            <button class="copy-btn" id="copyBtn" disabled>📋 复制</button>
        </div>
    </div>
    <div class="footer-note">
        * 点击卡片标记到位 · 可编辑班级名单
    </div>
</div>

<!-- 模态框 -->
<div class="modal-overlay" id="classModal">
    <div class="modal-card">
        <div class="modal-header">
            <h2>✏️ 编辑班级</h2>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-desc" style="margin-bottom:12px; color:#475569;">
            📌 一行一个班级 (如 2.1, 5.3)
        </div>
        <textarea id="classListTextarea" class="class-textarea" placeholder="输入班级，每行一个"></textarea>
        <div class="modal-actions" style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
            <button class="modal-btn modal-btn-cancel" id="cancelModalBtn">取消</button>
            <button class="modal-btn modal-btn-save" id="saveClassListBtn">保存并更新</button>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 全校班级 (1.1 ~ 6.6) ----------
        const DEFAULT_CLASSES = [
            '1.1','1.2','1.3','1.4','1.5','1.6','1.7','1.8','1.9',
            '2.1','2.2','2.3','2.4','2.5','2.6','2.7','2.8','2.9','2.10',
            '3.1','3.2','3.3','3.4','3.5','3.6','3.7','3.8','3.9','3.10','3.11',
            '4.1','4.2','4.3','4.4','4.5','4.6','4.7','4.8','4.9',
            '5.1','5.2','5.3','5.4','5.5','5.6','5.7','5.8',
            '6.1','6.2','6.3','6.4','6.5','6.6'
        ];

        // 当前班级列表 (可编辑)
        let currentClassList = [...DEFAULT_CLASSES];

        // 选中集合 (默认空)
        let selectedSet = new Set();

        // DOM 元素
        const gridContainer = document.getElementById('classGridContainer');
        const selectedCountSpan = document.getElementById('selectedCount');
        const generatedSentenceSpan = document.getElementById('generatedSentence');
        const copyBtn = document.getElementById('copyBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const copyToast = document.getElementById('copyToast');

        const classButtonMap = new Map();

        // 模态框
        const modalOverlay = document.getElementById('classModal');
        const classTextarea = document.getElementById('classListTextarea');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const saveClassListBtn = document.getElementById('saveClassListBtn');

        // 解析班级数值排序
        function parseClassNumber(className) {
            const parts = className.split('.');
            if (parts.length !== 2) return { grade: 0, cls: 0 };
            const grade = parseInt(parts[0], 10) || 0;
            const cls = parseInt(parts[1], 10) || 0;
            return { grade, cls };
        }

        function sortClasses(classArray) {
            return classArray.sort((a, b) => {
                const na = parseClassNumber(a);
                const nb = parseClassNumber(b);
                if (na.grade !== nb.grade) return na.grade - nb.grade;
                return na.cls - nb.cls;
            });
        }

        function generateSentenceFromSelected() {
            if (selectedSet.size === 0) return '暂无班级到位';
            const sorted = sortClasses(Array.from(selectedSet));
            return `${sorted.join('，')} 班安全监督员按时到位`;
        }

        function updateUI() {
            const count = selectedSet.size;
            selectedCountSpan.textContent = count;
            generatedSentenceSpan.textContent = generateSentenceFromSelected();
            copyBtn.disabled = (count === 0);

            for (let [cls, btn] of classButtonMap.entries()) {
                btn.classList.toggle('selected', selectedSet.has(cls));
            }
        }

        function toggleClass(className) {
            if (selectedSet.has(className)) {
                selectedSet.delete(className);
            } else {
                selectedSet.add(className);
            }
            updateUI();
        }

        function clearAllSelected() {
            if (selectedSet.size === 0) return;
            selectedSet.clear();
            updateUI();
        }

        async function copySentence() {
            const sentence = generatedSentenceSpan.textContent;
            if (!sentence || sentence === '暂无班级到位') return;
            try {
                await navigator.clipboard.writeText(sentence);
                copyToast.classList.add('show');
                setTimeout(() => copyToast.classList.remove('show'), 1500);
            } catch {
                const textarea = document.createElement('textarea');
                textarea.value = sentence;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                copyToast.classList.add('show');
                setTimeout(() => copyToast.classList.remove('show'), 1500);
            }
        }

        function renderGrid() {
            gridContainer.innerHTML = '';
            classButtonMap.clear();

            const validClasses = currentClassList.filter(cls => cls && cls.trim() !== '');
            validClasses.forEach(className => {
                const trimmed = className.trim();
                const btn = document.createElement('button');
                btn.className = 'class-btn';
                btn.textContent = trimmed;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleClass(trimmed);
                });
                gridContainer.appendChild(btn);
                classButtonMap.set(trimmed, btn);
            });

            // 清理已删除班级的选中状态
            const validSet = new Set(validClasses);
            for (let cls of selectedSet) {
                if (!validSet.has(cls)) selectedSet.delete(cls);
            }

            updateUI();
        }

        // 打开模态框并填充当前班级列表
        function openModal() {
            classTextarea.value = currentClassList.join('\n');
            modalOverlay.classList.add('show');
        }

        function closeModal() {
            modalOverlay.classList.remove('show');
        }

        function saveClassListFromModal() {
            const raw = classTextarea.value;
            const lines = raw.split('\n').map(l => l.trim()).filter(l => l !== '');
            if (lines.length === 0) {
                alert('至少保留一个班级');
                return;
            }
            currentClassList = [...new Set(lines)];  // 去重

            // 清理选中
            const newSet = new Set(currentClassList);
            for (let cls of selectedSet) {
                if (!newSet.has(cls)) selectedSet.delete(cls);
            }

            renderGrid();
            closeModal();
        }

        function init() {
            renderGrid();
            // 默认不勾选任何班级 —— 已满足

            clearAllBtn.addEventListener('click', clearAllSelected);
            copyBtn.addEventListener('click', (e) => {
                e.preventDefault();
                copySentence();
            });

            openModalBtn.addEventListener('click', openModal);
            closeModalBtn.addEventListener('click', closeModal);
            cancelModalBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
            saveClassListBtn.addEventListener('click', saveClassListFromModal);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('show')) {
                    closeModal();
                }
            });
        }

        init();
    })();
</script>
</body>
</html>
